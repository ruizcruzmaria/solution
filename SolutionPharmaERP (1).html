function daysExp(d){return Math.floor((new Date(d)-new Date("2026-06-19"))/(864e5));}
function nextCode(){const nums=inventory.map(i=>parseInt((i.code||"MED000").replace(/\D/g,""))||0);return"MED"+String(Math.max(0,...nums)+1).padStart(3,"0");}

function notif(msg,ok=true){

  n.style.border=ok?"1px solid #0F6E56":"1px solid #A32D2D";
  n.style.display="block";
  setTimeout(()=>{n.style.display="none";},3500);
}

function buildHeader(){

  return`<div style="background:#fff;border-bottom:1px solid #e2e5eb;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">

    <div style="display:flex;align-items:center;gap:10px">

      <span style="font-size:12px;background:#f4f5f7;color:#6b7280;padding:4px 10px;border-radius:5px;font-weight:600">${escHtml(currentUser.role)}</span>

  </div>`;
}

function buildMod(){
  if(currentMod==="dashboard") return buildDashboard();

  if(currentMod==="rrhh") return buildRRHH();
  if(currentMod==="reportes") return buildReportes();
  if(currentMod==="seguridad") return buildSeguridad();
  return "";
}

function buildDashboard(){

  const exp=inventory.filter(i=>daysExp(i.venc)<0);
  const cards=[
    {ico:"📦",lbl:"Valor en Inventario",val:fc(totalInv),sub:`${inventory.length} productos`,bg:"#E6F1FB",c:"#0C447C"},
    {ico:"🧾",lbl:"Ventas del Mes",val:fc(totalV),sub:`${sales.length} transacciones`,bg:"#E1F5EE",c:"#0F6E56"},
    {ico:"⚠️",lbl:"Stock Bajo",val:low.length,sub:"productos bajo mínimo",bg:"#FAEEDA",c:"#BA7517"},
    {ico:"📅",lbl:"Vencidos",val:exp.length,sub:"requieren retiro",bg:"#FCEBEB",c:"#A32D2D"},

  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px">

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:38px;height:38px;border-radius:8px;background:${c.bg};display:flex;align-items:center;justify-content:center;font-size:20px">${c.ico}</div>
        <span style="font-size:12px;color:#6b7280">${c.lbl}</span>
      </div>
      <div style="font-size:22px;font-weight:700;color:${c.c}">${c.val}</div>
      <div style="font-size:11px;color:#9ca3af;margin-top:3px">${c.sub}</div>
    </div>`).join("")}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px">
    <div style="background:#fff;border:1px solid #e2e5eb;border-radius:10px;padding:20px">
      <div style="font-weight:700;font-size:14px;margin-bottom:14px">Alertas del sistema</div>
      ${exp.length===0&&low.length===0?'<div style="color:#9ca3af;text-align:center;padding:20px">✅ Sin alertas pendientes</div>':""}

function calcMargen(){
  if(!invForm||!invForm.pc||!invForm.pv)return"";
  const m=(((invForm.pv-invForm.pc)/invForm.pc)*100).toFixed(1);
  const ok=+m>=0;
  return`<div style="padding:10px 14px;background:${ok?"#E1F5EE":"#FCEBEB"};border-radius:7px;font-size:13px">Margen: <b style="color:${ok?"#0F6E56":"#A32D2D"}">${m}%</b> — Ganancia: ${fc(invForm.pv-invForm.pc)} por unidad</div>`;
}

function openInvForm(id){
  if(id===null){
    invEditId=null;
    invForm={code:nextCode(),nc:"",nombre:"",lab:"",lote:"",pc:0,pv:0,stock:0,smin:0,smax:100,und:"UND",venc:"",cat:"Descartables",obs:""};
  }else{
    const item=inventory.find(i=>i.id===id);
    invEditId=id;
    invForm={...item,obs:item.obs||""};
  }
  render();
}

function saveInv(){
  const f=invForm;
  if(!f.nc.trim()||!f.nombre.trim()||!f.lab.trim()||!f.lote.trim()||!f.venc){
    notif("Complete todos los campos obligatorios (marcados con *)",false);return;
  }
  if(invEditId!==null){
    inventory=inventory.map(i=>i.id===invEditId?{...f,id:invEditId}:i);
    notif(`"${f.nc}" actualizado correctamente`);
  }else{
    inventory=[...inventory,{...f,id:Date.now()}];
    notif(`"${f.nc}" agregado al inventario`);
  }
  invForm=null;invEditId=null;render();
}

function confirmDelInv(id){invDelId=id;render();}
function doDelInv(id){
  const item=inventory.find(i=>i.id===id);
  inventory=inventory.filter(i=>i.id!==id);
  invDelId=null;
  notif(`"${item?.nc}" eliminado del inventario`);
  render();
}

function addToCart(id){const item=inventory.find(i=>i.id===id);if(!item)return;const ex=cart.find(c=>c.id===id);if(ex)cart=cart.map(c=>c.id===id?{...c,qty:c.qty+1}:c);else cart=[...cart,{...item,qty:1}];ventaSearch="";render();}
function rmFromCart(idx){cart=cart.filter((_,i)=>i!==idx);render();}
function updCartQty(idx,q){cart=cart.map((c,i)=>i===idx?{...c,qty:Math.max(1,q)}:c);render();}
function finalizeSale(){
  const total=cart.reduce((s,i)=>s+i.pv*i.qty,0);
  if(!cart.length||!ventaCliente){notif("Complete el cliente y agregue productos",false);return;}
  sales=[...sales,{id:Date.now(),fecha:new Date().toISOString().split("T")[0],cliente:ventaCliente,total,pago:ventaMetodo}];
  inventory=inventory.map(i=>{const ci=cart.find(c=>c.id===i.id);return ci?{...i,stock:i.stock-ci.qty}:i;});
  cart=[];ventaCliente="";ventaSearch="";
  notif(`Venta por ${fc(total)} registrada exitosamente`);
  ventaTab="historial";render();
}

      ${[...inventory].sort((a,b)=>b.stock-a.stock).slice(0,8).map((i,idx)=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f4f5f7;font-size:13px">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="width:22px;height:22px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#0C447C">${idx+1}</span>
          <span style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(i.nc)}</span>
        </div>
        <span style="font-weight:700;color:#0C447C">${i.stock} ${i.und}</span>
      </div>`).join("")}
    </div>
    <div style="background:#fff;border:1px solid #e2e5eb;border-radius:10px;padding:20px">
      <div style="font-weight:700;font-size:14px;margin-bottom:14px">Stock por categoría</div>
      ${Object.entries(bycat).map(([cat,total])=>`
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>${escHtml(cat)}</span><span style="font-weight:700">${total}</span></div>
        <div style="height:6px;background:#f4f5f7;border-radius:3px"><div style="height:100%;width:${Math.min((total/max)*100,100)}%;background:#0C447C;border-radius:3px"></div></div>
      </div>`).join("")}
    </div>
  </div>
  <div style="background:#fff;border:1px solid #e2e5eb;border-radius:10px;padding:20px">
    <div style="font-weight:700;font-size:14px;margin-bottom:14px">Resumen de ventas 2026</div>
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px">
      ${[["Ene",45000],["Feb",52000],["Mar",48000],["Abr",61000],["May",58000],["Jun",71000]].map(([m,v])=>`
      <div style="text-align:center;padding:12px 6px;background:#f4f5f7;border-radius:8px">
        <div style="font-size:12px;font-weight:700;color:#0C447C">${fc(v)}</div>
        <div style="font-size:11px;color:#6b7280;margin-top:4px">${m}</div>
      </div>`).join("")}
    </div>
  </div>`;
}

// ===== SEGURIDAD =====
function buildSeguridad(){
  return`
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
    <div style="background:#fff;border:1px solid #e2e5eb;border-radius:10px;padding:20px">
      <div style="font-weight:700;font-size:14px;margin-bottom:14px">Usuarios del sistema</div>
      ${USERS.map(u=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f4f5f7">
        <div><div style="font-weight:600;font-size:14px">${escHtml(u.name)}</div><div style="font-size:11px;color:#9ca3af">@${escHtml(u.username)} — ${escHtml(u.role)}</div></div>
        <span style="background:#E1F5EE;color:#0F6E56;font-size:11px;padding:2px 8px;border-radius:5px;font-weight:600">Activo</span>
      </div>`).join("")}
    </div>
    <div style="background:#fff;border:1px solid #e2e5eb;border-radius:10px;padding:20px">
      <div style="font-weight:700;font-size:14px;margin-bottom:14px">Permisos por rol</div>
      ${[["👑 Administrador",["Acceso total","Inventario","Ventas","Compras","RRHH","Reportes","Seguridad"]],["🛒 Vendedor",["Ventas/POS","Ver inventario"]],["📦 Almacenero",["Inventario","Compras","Proveedores"]]].map(([rol,perms])=>`
      <div style="margin-bottom:14px">
        <div style="font-size:13px;font-weight:700;margin-bottom:6px;color:#0C447C">${rol}</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">${perms.map(p=>`<span style="background:#E6F1FB;color:#0C447C;font-size:11px;padding:2px 8px;border-radius:5px">${p}</span>`).join("")}</div>
      </div>`).join("")}
    </div>
  </div>
  <div style="background:#fff;border:1px solid #e2e5eb;border-radius:10px;padding:20px">
    <div style="font-weight:700;font-size:14px;margin-bottom:14px">Bitácora de actividades</div>
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead><tr style="background:#f4f5f7;border-bottom:1px solid #e2e5eb">
        ${["Usuario","Acción","Módulo","Fecha/Hora"].map(h=>`<th style="padding:8px 12px;text-align:left;font-weight:700;color:#6b7280;font-size:12px">${h}</th>`).join("")}
      </tr></thead>
      <tbody>${[
        {u:"admin",a:"Inicio de sesión",m:"Sistema",f:"2026-06-19 09:15"},
        {u:"vendedor",a:"Registró venta #1005",m:"Ventas",f:"2026-06-19 09:22"},
        {u:"admin",a:"Agregó producto",m:"Inventario",f:"2026-06-19 10:05"},
        {u:"almacen",a:"Actualizó stock",m:"Inventario",f:"2026-06-19 11:30"},
        {u:"admin",a:"Generó reporte mensual",m:"Reportes",f:"2026-06-19 14:00"},
      ].reverse().map(l=>`<tr style="border-bottom:1px solid #f4f5f7">
        <td style="padding:8px 12px;font-weight:700;color:#0C447C">@${l.u}</td>
        <td style="padding:8px 12px">${l.a}</td>
        <td style="padding:8px 12px"><span style="background:#f4f5f7;font-size:11px;padding:2px 8px;border-radius:5px">${l.m}</span></td>
        <td style="padding:8px 12px;font-family:monospace;font-size:11px;color:#6b7280">${l.f}</td>
      </tr>`).join("")}</tbody>
    </table>
  </div>`;
}

// ===== ACCIONES GLOBALES =====
function doLogin(){
  const u=document.getElementById("li_u").value.trim();
  const p=document.getElementById("li_p").value;
  const found=USERS.find(x=>x.username===u&&x.password===p);
  if(found){currentUser=found;render();}
  else{const e=document.getElementById("li_err");e.textContent="❌ Usuario o contraseña incorrectos. Intente de nuevo.";e.style.display="block";}
}
function doLogout(){currentUser=null;currentMod="dashboard";cart=[];render();}
function setMod(m){currentMod=m;invSearch="";invFilter="todos";invForm=null;invEditId=null;invDelId=null;render();}
function toggleSidebar(){sidebarOpen=!sidebarOpen;render();}

// ===== INICIAR =====
window.onload=function(){
  document.getElementById("loading").style.display="none";
  document.getElementById("app").innerHTML="";
  render();
};
</script>

<div id="app"></div>
</body>
</html>
